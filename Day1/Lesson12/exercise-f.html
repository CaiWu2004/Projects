<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>12f</title>
    <style>
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: rgb(120, 82, 178);
        color: white;
        padding-left: 15px;
        padding-right: 15px;
      }

      .left-section {
        font-weight: bold;
      }

      .center-section {
        width: 500px;
        border: none;
        height: 30px;
        margin-top: 12px;
        margin-bottom: 12px;
        border-radius: 15px;
        padding-left: 20px;
      }

      button {
        background-color: rgb(120, 82, 178);
        color: white;
        border: 1px solid white;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 15px;
        padding-right: 15px;
        font-weight: bold;
        font-size: 16px;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="left-section">Home</div>
      <input class="center-section" type="text" placeholder="Search" />
      <button>Download</button>
    </div>
  </body>
</html>
