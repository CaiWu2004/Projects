<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Practice</title>
  </head>
  <body style="padding-bottom: 1000px">
    <div style="display: grid; grid-template-columns: 100px 100px">
      <div style="background-color: lightblue">Div 1</div>
      <div style="background-color: lightpink">
        Div 2
        <p>Text</p>
      </div>
    </div>

    <div
      style="
        margin-top: 30px;
        display: grid;
        grid-template-columns: 100px 100px 200px;
      "
    >
      <div style="background-color: lightblue">100px</div>
      <div style="background-color: lightpink">
        100px
        <p>Text</p>
      </div>
      <div style="background-color: lightgreen">200px</div>
      <div style="background-color: lightpink">100px</div>
    </div>
    <!-- 3rd example -->
    <div
      style="margin-top: 30px; display: grid; grid-template-columns: 100px 1fr"
    >
      <div style="background-color: lightblue">100px</div>
      <div style="background-color: lightpink">1fr</div>
    </div>

    <!-- example 4th -->
    <div
      style="
        margin-top: 30px;
        display: grid;
        grid-template-columns: 100px 1fr 2fr;
      "
    >
      <div style="background-color: lightblue">100px</div>
      <div style="background-color: lightpink">1fr</div>
      <div style="background-color: lightgreen">2fr</div>
    </div>

    <!-- example 5th -->
    <div
      style="
        margin-top: 30px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        column-gap: 20px;
        row-gap: 20px;
      "
    >
      <div style="background-color: lightblue; height: 200px">1fr</div>
      <div style="background-color: lightpink; height: 200px">1fr</div>
      <div style="background-color: lightgreen; height: 200px">1fr</div>
      <div style="background-color: lightgreen; height: 200px">1fr</div>
      <div style="background-color: lightblue; height: 200px">1fr</div>
      <div style="background-color: lightpink; height: 200px">1fr</div>
    </div>

    <!-- Exercise -->
    <!-- example 5th -->
    <div
      style="margin-top: 30px; display: grid; grid-template-columns: 200px 75px"
    >
      <div style="background-color: lightblue; height: 20px">200px</div>
      <div style="background-color: lightpink; height: 20px">75px</div>
    </div>

    <div
      style="
        margin-top: 30px;
        display: grid;
        grid-template-columns: 50px 1fr 75px;
      "
    >
      <div style="background-color: lightblue; height: 20px">col1</div>
      <div style="background-color: lightpink; height: 20px">col2</div>
      <div style="background-color: lightblue; height: 20px">col3</div>
    </div>

    <div
      style="
        margin-top: 30px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        column-gap: 20px;
        row-gap: 10px;
      "
    >
      <div style="background-color: lightpink; height: 20px">col11</div>
      <div style="background-color: lightpink; height: 20px">col2</div>
      <div style="background-color: lightpink; height: 20px">col3</div>
      <div style="background-color: lightpink; height: 20px">col4</div>
      <div style="background-color: lightpink; height: 20px">col1</div>
      <div style="background-color: lightpink; height: 20px">col2</div>
      <div style="background-color: lightpink; height: 20px">col3</div>
      <div style="background-color: lightpink; height: 20px">col4</div>
    </div>
  </body>
</html>
